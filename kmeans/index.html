<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" href="../thumbnails/favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbit&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Means 클러스터링 체험</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: #f5f5f0; color: #333; }

  .topbar { background: #2e7d32; color: #fff; display: flex; align-items: center; padding: 0 24px; height: 48px; }
  .topbar h1 { font-size: 16px; font-weight: 600; color: #fff; text-align: left; margin: 0; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .page-title { text-align: center; color: #1b5e20; margin-bottom: 8px; font-size: 1.8em; font-weight: 700; }
  .subtitle { text-align: center; color: #888; margin-bottom: 24px; font-size: 0.95em; }

  .main-layout { display: flex; gap: 20px; }
  .left-panel { flex: 1; min-width: 0; }
  .right-panel { width: 340px; flex-shrink: 0; overflow: hidden; }

  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card h2 { font-size: 1.1em; color: #6b8c63; margin-bottom: 12px; }
  .card h3 { font-size: 0.95em; color: #555; margin-bottom: 8px; }

  canvas { border: 1px solid #ddd; border-radius: 8px; cursor: crosshair; background: #fff; }
  #mainCanvas { width: 100%; }


  .step-info { background: #f0f4ee; border-radius: 8px; padding: 14px; margin-bottom: 12px; min-height: 60px; }
  .step-info .step-label { font-weight: bold; color: #6b8c63; font-size: 1.05em; }
  .step-info .step-desc { color: #555; margin-top: 4px; font-size: 0.92em; line-height: 1.5; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 10px 18px; border: none; border-radius: 8px; font-size: 0.95em; cursor: pointer; font-weight: 600; transition: all 0.15s; }
  .btn:hover { transform: translateY(-1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-primary { background: #6b8c63; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #5a7a54; }
  .btn-accent { background: #e8a0aa; color: #fff; }
  .btn-accent:hover:not(:disabled) { background: #d48a94; }
  .btn-outline { background: #fff; color: #6b8c63; border: 2px solid #6b8c63; }
  .btn-outline:hover:not(:disabled) { background: #f0f4ee; }
  .btn-sm { padding: 6px 14px; font-size: 0.85em; }

  .k-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .k-selector label { font-weight: 600; color: #555; }
  .k-selector select { padding: 6px 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 1em; }

  .legend { display: flex; gap: 16px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.85em; color: #555; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .legend-star { font-size: 1.2em; }

  .phase-indicator { display: flex; gap: 4px; margin-bottom: 16px; }
  .phase-dot { flex: 1; height: 6px; border-radius: 3px; background: #ddd; transition: background 0.3s; }
  .phase-dot.active { background: #6b8c63; }
  .phase-dot.done { background: #e8a0aa; }

  .iter-counter { text-align: center; font-size: 0.9em; color: #888; margin-top: 8px; }

  .help-text { font-size: 0.85em; color: #999; line-height: 1.5; margin-top: 8px; }

  @media (max-width: 900px) {
    .main-layout { flex-direction: column; }
    .right-panel { width: 100%; }
  }
.topbar h1, .page-title { font-family: 'Orbit', sans-serif; }
</style>
</head>
<body>
<div class="topbar">
  <h1>기계학습 &gt; K-Means 클러스터링</h1>
</div>
<div class="container">
  <div class="page-title">K-Means 클러스터링 체험</div>
  <p class="subtitle">비지도 학습 — 데이터의 군집을 찾아보세요</p>

  <div class="main-layout">
    <div class="left-panel">
      <div class="card">
        <div class="phase-indicator">
          <div class="phase-dot" id="phase0"></div>
          <div class="phase-dot" id="phase1"></div>
          <div class="phase-dot" id="phase2"></div>
          <div class="phase-dot" id="phase3"></div>
        </div>
        <canvas id="mainCanvas" width="700" height="500"></canvas>
        <div class="legend" id="legend"></div>
        <div class="iter-counter" id="iterCounter"></div>
      </div>

    </div>

    <div class="right-panel">
      <div class="card">
        <h2>진행 단계</h2>
        <div class="step-info" id="stepInfo">
          <div class="step-label">시작</div>
          <div class="step-desc">아래 그래프를 참고하여 K값을 선택하고, "K 확정" 버튼을 눌러주세요.</div>
        </div>

        <div id="kSelectorArea">
          <h3 style="margin-bottom:8px; font-size:0.85em;">실루엣 점수 (높을수록 좋음)</h3>
          <canvas id="silhouetteChart" width="300" height="160" style="max-width:100%; cursor:pointer;"></canvas>
          <div class="k-selector" style="margin-top:10px; justify-content:center;">
            <label>K =</label>
            <select id="kSelect">
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
            <button class="btn btn-primary btn-sm" id="btnConfirmK">K 확정</button>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn-accent" id="btnNext" disabled>다음 단계 →</button>
          <button class="btn btn-outline btn-sm" id="btnReset">처음부터</button>
        </div>
      </div>

      <div class="card">
        <h2>현재 상태</h2>
        <div id="statusArea" style="font-size:0.9em; color:#555; line-height:1.7;">
          데이터 포인트: <strong id="pointCount">0</strong>개<br>
          선택한 K: <strong id="selectedK">-</strong><br>
          반복 횟수: <strong id="iterNum">0</strong><br>
          현재 단계: <strong id="currentPhase">K 선택</strong>
        </div>
      </div>

      <div class="card">
        <h2>단계 설명</h2>
        <div style="font-size:0.85em; color:#666; line-height:1.7;">
          <strong>① K 선택</strong> — 몇 개 군집?<br>
          <strong>② 초기 중심점 배치</strong> — 캔버스 클릭<br>
          <strong>③ 배정</strong> — 각 점 → 가장 가까운 중심<br>
          <strong>④ 갱신</strong> — 중심 → 군집 평균으로 이동<br>
          ③↔④ 반복, 변화 없으면 완료!
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// === 색상 팔레트 ===
const COLORS = ['#e07a5f', '#3d85c6', '#81b29a', '#f2cc8f', '#9b72aa'];
const CENTROID_COLORS = ['#c0392b', '#1a5276', '#1e8449', '#d4a017', '#6c3483'];
const UNASSIGNED = '#aaa';

// === 상태 ===
let data = [];
let centroids = [];
let assignments = [];
let K = 3;
let phase = 'select_k'; // select_k, place_centroids, assign, update, done
let iteration = 0;
let centroidsPlaced = 0;
let history = [];

// === 캔버스 ===
const mainCanvas = document.getElementById('mainCanvas');
const ctx = mainCanvas.getContext('2d');
const silCanvas = document.getElementById('silhouetteChart');

// === UI 요소 ===
const btnNext = document.getElementById('btnNext');
const btnReset = document.getElementById('btnReset');
const btnConfirmK = document.getElementById('btnConfirmK');
const kSelect = document.getElementById('kSelect');
const stepInfo = document.getElementById('stepInfo');
const kSelectorArea = document.getElementById('kSelectorArea');

// === 데이터 생성 (3개 군집 경향) ===
function generateData() {
  const points = [];
  const clusters = [
    { cx: 150, cy: 130, spread: 45, n: 35 },
    { cx: 450, cy: 350, spread: 50, n: 40 },
    { cx: 550, cy: 120, spread: 40, n: 30 },
  ];
  clusters.forEach(c => {
    for (let i = 0; i < c.n; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * c.spread + Math.random() * c.spread * 0.5;
      points.push({
        x: c.cx + Math.cos(angle) * r,
        y: c.cy + Math.sin(angle) * r
      });
    }
  });
  return points;
}

// === 거리 ===
function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

// === 배정 ===
function assignPoints() {
  return data.map(p => {
    let minD = Infinity, minIdx = 0;
    centroids.forEach((c, i) => {
      const d = dist(p, c);
      if (d < minD) { minD = d; minIdx = i; }
    });
    return minIdx;
  });
}

// === 갱신 ===
function updateCentroids() {
  const newCentroids = centroids.map((c, i) => {
    const pts = data.filter((_, j) => assignments[j] === i);
    if (pts.length === 0) return { ...c };
    return {
      x: pts.reduce((s, p) => s + p.x, 0) / pts.length,
      y: pts.reduce((s, p) => s + p.y, 0) / pts.length
    };
  });
  return newCentroids;
}

// === 실루엣 점수 ===
function computeSilhouette(data, k) {
  if (k < 2 || k >= data.length) return 0;

  let centers = [...data].sort(() => Math.random() - 0.5).slice(0, k).map(p => ({ ...p }));
  for (let iter = 0; iter < 30; iter++) {
    const asgn = data.map(p => {
      let minD = Infinity, minI = 0;
      centers.forEach((c, i) => { const d = dist(p, c); if (d < minD) { minD = d; minI = i; } });
      return minI;
    });
    centers = centers.map((c, i) => {
      const pts = data.filter((_, j) => asgn[j] === i);
      if (pts.length === 0) return c;
      return { x: pts.reduce((s, p) => s + p.x, 0) / pts.length, y: pts.reduce((s, p) => s + p.y, 0) / pts.length };
    });
  }
  const finalAsgn = data.map(p => {
    let minD = Infinity, minI = 0;
    centers.forEach((c, i) => { const d = dist(p, c); if (d < minD) { minD = d; minI = i; } });
    return minI;
  });

  let totalSil = 0;
  data.forEach((p, i) => {
    const myCluster = finalAsgn[i];
    const samePts = data.filter((_, j) => j !== i && finalAsgn[j] === myCluster);
    const a = samePts.length > 0 ? samePts.reduce((s, q) => s + dist(p, q), 0) / samePts.length : 0;

    let minB = Infinity;
    for (let c = 0; c < k; c++) {
      if (c === myCluster) continue;
      const otherPts = data.filter((_, j) => finalAsgn[j] === c);
      if (otherPts.length === 0) continue;
      const avgD = otherPts.reduce((s, q) => s + dist(p, q), 0) / otherPts.length;
      if (avgD < minB) minB = avgD;
    }
    if (minB === Infinity) minB = 0;

    const sil = Math.max(a, minB) === 0 ? 0 : (minB - a) / Math.max(a, minB);
    totalSil += sil;
  });

  return totalSil / data.length;
}

// === 실루엣 그래프 (연결선) ===
function drawSilhouette() {
  const cvs = silCanvas;
  const c = cvs.getContext('2d');
  const W = cvs.width, H = cvs.height;
  c.clearRect(0, 0, W, H);

  const ks = [2, 3, 4, 5, 6];
  const values = ks.map(k => computeSilhouette(data, k));
  const maxV = Math.max(...values, 0.01);
  const minV = Math.min(...values, 0);

  const pad = { l: 20, r: 20, t: 20, b: 30 };
  const plotW = W - pad.l - pad.r;
  const plotH = H - pad.t - pad.b;

  // 축
  c.strokeStyle = '#ccc';
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(pad.l, pad.t);
  c.lineTo(pad.l, H - pad.b);
  c.lineTo(W - pad.r, H - pad.b);
  c.stroke();

  // 연결선
  c.strokeStyle = '#6b8c63';
  c.lineWidth = 2.5;
  c.beginPath();
  ks.forEach((k, i) => {
    const x = pad.l + (i / (ks.length - 1)) * plotW;
    const y = pad.t + (1 - (values[i] - minV) / (maxV - minV + 0.01)) * plotH;
    i === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
  });
  c.stroke();

  // 점 + 라벨
  ks.forEach((k, i) => {
    const x = pad.l + (i / (ks.length - 1)) * plotW;
    const y = pad.t + (1 - (values[i] - minV) / (maxV - minV + 0.01)) * plotH;

    c.fillStyle = k === K ? '#e8a0aa' : '#6b8c63';
    c.beginPath();
    c.arc(x, y, k === K ? 7 : 5, 0, Math.PI * 2);
    c.fill();

    // 점수 표시
    c.fillStyle = k === K ? '#c0392b' : '#555';
    c.font = k === K ? 'bold 12px sans-serif' : '11px sans-serif';
    c.textAlign = 'center';
    c.fillText(values[i].toFixed(2), x, y - 12);

    // K 라벨
    c.fillStyle = '#666';
    c.font = '12px sans-serif';
    c.fillText('K=' + k, x, H - pad.b + 16);
  });

  // Y축 라벨 (제목에 포함되어 있으므로 생략)
}

// === 메인 캔버스 ===
function drawMain() {
  const W = mainCanvas.width, H = mainCanvas.height;
  ctx.clearRect(0, 0, W, H);

  // 배경 격자
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // 배정 시 연결선
  if (assignments.length > 0 && centroids.length > 0) {
    data.forEach((p, i) => {
      const c = centroids[assignments[i]];
      if (!c) return;
      ctx.strokeStyle = COLORS[assignments[i]] + '30';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(c.x, c.y);
      ctx.stroke();
    });
  }

  // 데이터 포인트
  data.forEach((p, i) => {
    const color = assignments.length > 0 ? COLORS[assignments[i]] || UNASSIGNED : UNASSIGNED;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // 중심점
  centroids.forEach((c, i) => {
    // 외곽 원
    ctx.strokeStyle = CENTROID_COLORS[i];
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(c.x, c.y, 14, 0, Math.PI * 2);
    ctx.stroke();

    // 내부
    ctx.fillStyle = CENTROID_COLORS[i];
    ctx.beginPath();
    ctx.arc(c.x, c.y, 8, 0, Math.PI * 2);
    ctx.fill();

    // 십자
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(c.x - 5, c.y); ctx.lineTo(c.x + 5, c.y);
    ctx.moveTo(c.x, c.y - 5); ctx.lineTo(c.x, c.y + 5);
    ctx.stroke();

    // K 번호
    ctx.fillStyle = CENTROID_COLORS[i];
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`C${i + 1}`, c.x, c.y - 18);
  });

  // 중심점 배치 모드일 때 안내
  if (phase === 'place_centroids') {
    ctx.fillStyle = 'rgba(107,140,99,0.85)';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`캔버스를 클릭하여 중심점을 배치하세요 (${centroidsPlaced}/${K})`, mainCanvas.width / 2, 25);
  }

  // 범례 업데이트
  updateLegend();
}

function updateLegend() {
  const legend = document.getElementById('legend');
  if (centroids.length === 0) {
    legend.innerHTML = '<span class="legend-item"><span class="legend-dot" style="background:#aaa"></span> 데이터 포인트</span>';
    return;
  }
  let html = '';
  for (let i = 0; i < centroids.length; i++) {
    html += `<span class="legend-item"><span class="legend-dot" style="background:${COLORS[i]}"></span> 군집 ${i + 1}</span>`;
  }
  html += `<span class="legend-item"><span style="color:${CENTROID_COLORS[0]}; font-size:1.1em;">✚</span> 중심점</span>`;
  legend.innerHTML = html;
}

// === 단계 업데이트 ===
function updateStepInfo() {
  const label = stepInfo.querySelector('.step-label');
  const desc = stepInfo.querySelector('.step-desc');

  document.querySelectorAll('.phase-dot').forEach((d, i) => {
    d.className = 'phase-dot';
  });

  switch (phase) {
    case 'select_k':
      label.textContent = '① K 선택';
      desc.textContent = '아래 실루엣 그래프를 참고하여 적절한 K를 선택하세요.';
      document.getElementById('phase0').classList.add('active');
      document.getElementById('currentPhase').textContent = 'K 선택';
      break;
    case 'place_centroids':
      label.textContent = '② 초기 중심점 배치';
      desc.textContent = `캔버스를 클릭하여 ${K}개의 초기 중심점을 배치하세요. (${centroidsPlaced}/${K})`;
      document.getElementById('phase0').classList.add('done');
      document.getElementById('phase1').classList.add('active');
      document.getElementById('currentPhase').textContent = '중심점 배치';
      break;
    case 'assign':
      label.textContent = `③ 배정 (반복 ${iteration + 1})`;
      desc.textContent = '각 데이터 포인트를 가장 가까운 중심점의 군집으로 배정합니다. "다음 단계"를 눌러주세요.';
      document.getElementById('phase0').classList.add('done');
      document.getElementById('phase1').classList.add('done');
      document.getElementById('phase2').classList.add('active');
      document.getElementById('currentPhase').textContent = '배정 대기';
      break;
    case 'update':
      label.textContent = `④ 갱신 (반복 ${iteration + 1})`;
      desc.textContent = '각 군집의 평균 위치로 중심점을 이동합니다. "다음 단계"를 눌러주세요.';
      document.getElementById('phase0').classList.add('done');
      document.getElementById('phase1').classList.add('done');
      document.getElementById('phase2').classList.add('done');
      document.getElementById('phase3').classList.add('active');
      document.getElementById('currentPhase').textContent = '갱신 대기';
      break;
    case 'done':
      label.textContent = '✓ 완료!';
      desc.textContent = `${iteration}번 반복 후 중심점이 더 이상 변하지 않습니다. 군집화가 완료되었습니다!`;
      document.querySelectorAll('.phase-dot').forEach(d => d.classList.add('done'));
      document.getElementById('currentPhase').textContent = '완료';
      break;
  }

  document.getElementById('iterNum').textContent = iteration;
  document.getElementById('iterCounter').textContent = iteration > 0 ? `반복 ${iteration}회` : '';
}

// === 이벤트 ===
btnConfirmK.addEventListener('click', () => {
  K = parseInt(kSelect.value);
  document.getElementById('selectedK').textContent = K;
  phase = 'place_centroids';
  centroidsPlaced = 0;
  centroids = [];
  assignments = [];
  kSelectorArea.style.display = 'none';
  btnNext.disabled = true;
  updateStepInfo();
  drawMain();
  drawSilhouette();
});

mainCanvas.addEventListener('click', (e) => {
  if (phase !== 'place_centroids') return;

  const rect = mainCanvas.getBoundingClientRect();
  const scaleX = mainCanvas.width / rect.width;
  const scaleY = mainCanvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  centroids.push({ x, y });
  centroidsPlaced++;

  if (centroidsPlaced >= K) {
    phase = 'assign';
    btnNext.disabled = false;
  }

  updateStepInfo();
  drawMain();
});

btnNext.addEventListener('click', () => {
  if (phase === 'assign') {
    // 배정 단계 실행
    assignments = assignPoints();
    phase = 'update';
    updateStepInfo();
    drawMain();
  } else if (phase === 'update') {
    // 갱신 단계 실행
    const newCentroids = updateCentroids();

    // 수렴 확인
    let converged = true;
    for (let i = 0; i < centroids.length; i++) {
      if (dist(centroids[i], newCentroids[i]) > 0.5) {
        converged = false;
        break;
      }
    }

    centroids = newCentroids;
    iteration++;

    if (converged) {
      phase = 'done';
      btnNext.disabled = true;
    } else {
      phase = 'assign';
    }

    updateStepInfo();
    drawMain();
  }
});

btnReset.addEventListener('click', () => {
  data = generateData();
  centroids = [];
  assignments = [];
  K = parseInt(kSelect.value);
  phase = 'select_k';
  iteration = 0;
  centroidsPlaced = 0;
  kSelectorArea.style.display = 'block';
  btnNext.disabled = true;
  document.getElementById('selectedK').textContent = '-';
  document.getElementById('pointCount').textContent = data.length;
  updateStepInfo();
  drawMain();
  drawSilhouette();
});

kSelect.addEventListener('change', () => {
  K = parseInt(kSelect.value);
  drawSilhouette();
});

// === 초기화 ===
function init() {
  data = generateData();
  document.getElementById('pointCount').textContent = data.length;
  updateStepInfo();
  drawMain();
  drawSilhouette();
}

init();
</script>
</body>
</html>
