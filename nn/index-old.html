<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>순전파 · 역전파 시각화 — 오리 vs 거위</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #4a6741;
  font-family: 'KoPub World 돋움', '맑은 고딕', sans-serif;
  color: #f2f1df;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  min-height: 100vh;
}
h1 { font-size: 1.8rem; margin-bottom: 6px; color: #f2f1df; letter-spacing: 2px; }
#subtitle { font-size: 0.88rem; color: #a0c09d; margin-bottom: 18px; }
canvas { background: #3a5438; border-radius: 12px; display: block; }
#info-panel {
  background: #3a5438;
  border-radius: 10px;
  padding: 16px 26px;
  margin-top: 10px;
  width: 760px;
  height: 130px;
  overflow: hidden;
}
#step-name { font-size: 1.02rem; color: #e8a0aa; margin-bottom: 4px; font-weight: bold; }
#step-desc { font-size: 0.87rem; line-height: 1.7; white-space: pre-line; color: #d8d7bd; }
#controls {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  margin-bottom: 4px;
  align-items: center;
}
button {
  background: #5a7a57;
  color: #f2f1df;
  border: 1px solid #7a9a77;
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 0.9rem;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
button:hover { background: #6a8a67; }
#btn-next { background: #7a5a5d; border-color: #e8a0aa; padding: 8px 24px; }
#btn-next:hover { background: #8a6a6d; }
#btn-prev { background: #5a6a7a; border-color: #7a9aaa; }
#btn-prev:hover { background: #6a7a8a; }
#stat-row { display: flex; gap: 20px; margin-top: 10px; font-size: 1.1rem; color: #a0c09d; }
#stat-row span { color: #ffd080; font-size: 1.2rem; font-weight: bold; }
#speed-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 0.83rem; color: #a0c09d; }
#speed-slider { accent-color: #e8a0aa; width: 140px; cursor: pointer; }
#speed-label { color: #ffd080; min-width: 36px; }
</style>
</head>
<body>
<h1>순전파 · 역전파 시각화</h1>
<div id="subtitle">예시: 목 길이(x₁)와 부리 크기(x₂)로 오리 / 거위를 분류합니다 &nbsp;|&nbsp; 출력값 ≥ 0.5 → 거위 &nbsp;|&nbsp; 출력값 &lt; 0.5 → 오리</div>
<canvas id="canvas" width="760" height="400"></canvas>
<div id="controls">
  <button id="btn-reset">↺ 초기화</button>
  <button id="btn-prev">◀ 이전</button>
  <button id="btn-next">다음 ▶</button>
  <button id="btn-play">⏵ 전체 재생</button>
</div>
<div id="info-panel">
  <div id="step-name">① 초기 상태</div>
  <div id="step-desc"></div>
</div>
<div id="stat-row">
  학습 횟수: <span id="epoch-info">0</span>회 &nbsp;|&nbsp; 마지막 손실: <span id="loss-display">—</span>
</div>
<div id="speed-row">
  재생 속도 &nbsp;
  <input type="range" id="speed-slider" min="1" max="5" value="2" step="1">
  &nbsp;<span id="speed-label">보통</span>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 760, H = 400;

const C = {
  bg: '#3a5438',
  line: '#4a6a47',
  forward: '#7eb8d4',
  backward: '#e8a0aa',
  weightNormal: '#8aaa87',
  weightChanged: '#ffd080',
  nodeBorder: '#7a9a77',
  text: '#f2f1df',
  textDim: '#a0c09d',
};

const ARCH = [2, 3, 1];
const LR = 0.1;
const NODE_R = 30;
const LAYER_X = [110, 330, 600];
const INPUT_LABELS = ['목 길이', '부리 크기'];

function nodeY(layer, idx) {
  const spacing = 90;
  const totalH = (ARCH[layer] - 1) * spacing;
  return H / 2 - totalH / 2 + idx * spacing;
}

function relu(x) { return Math.max(0, x); }
function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }
function sigmoidDeriv(x) { const s = sigmoid(x); return s * (1 - s); }
function predict(out) { return out >= 0.5 ? '거위 🪿' : '오리 🦆'; }

// ─── 고정 데이터셋 ───
const DATASET = [
  { input: [0.90, 0.80], label: 1, name: '거위 01' },
  { input: [0.80, 0.90], label: 1, name: '거위 02' },
  { input: [0.70, 0.80], label: 1, name: '거위 03' },
  { input: [0.85, 0.75], label: 1, name: '거위 04' },
  { input: [0.75, 0.85], label: 1, name: '거위 05' },
  { input: [0.95, 0.70], label: 1, name: '거위 06' },
  { input: [0.65, 0.90], label: 1, name: '거위 07' },
  { input: [0.88, 0.82], label: 1, name: '거위 08' },
  { input: [0.72, 0.78], label: 1, name: '거위 09' },
  { input: [0.93, 0.65], label: 1, name: '거위 10' },
  { input: [0.78, 0.92], label: 1, name: '거위 11' },
  { input: [0.68, 0.72], label: 1, name: '거위 12' },
  { input: [0.20, 0.20], label: 0, name: '오리 01' },
  { input: [0.10, 0.30], label: 0, name: '오리 02' },
  { input: [0.30, 0.10], label: 0, name: '오리 03' },
  { input: [0.15, 0.25], label: 0, name: '오리 04' },
  { input: [0.25, 0.15], label: 0, name: '오리 05' },
  { input: [0.05, 0.20], label: 0, name: '오리 06' },
  { input: [0.35, 0.22], label: 0, name: '오리 07' },
  { input: [0.12, 0.18], label: 0, name: '오리 08' },
  { input: [0.28, 0.08], label: 0, name: '오리 09' },
  { input: [0.08, 0.32], label: 0, name: '오리 10' },
  { input: [0.22, 0.28], label: 0, name: '오리 11' },
  { input: [0.32, 0.12], label: 0, name: '오리 12' },
];

// 매 에폭 시작 시 셔플된 순서로 진행
let shuffledOrder = [];
let dataIdx = 0;

function shuffleDataset() {
  shuffledOrder = DATASET.map((_, i) => i);
  for (let i = shuffledOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffledOrder[i], shuffledOrder[j]] = [shuffledOrder[j], shuffledOrder[i]];
  }
  dataIdx = 0;
}

// ─── 상태 ───
let weights = [], biases = [];
let acts = [], preActs = [], grads = [], wDeltas = [];
let epoch = 0, totalLoss = 0;
let inputData = DATASET[0].input.slice();
let label = DATASET[0].label;
let particles = [];
let currentStep = 0;
let isPlaying = false;
let playTimer = null;

// 사이클 시작 상태 저장 (이전 단계 이동용)
let cycleWeights = null, cycleInput = null, cycleLabel = 1;

function initWeights() {
  weights = []; biases = [];
  for (let l = 0; l < ARCH.length - 1; l++) {
    weights[l] = []; biases[l] = [];
    for (let j = 0; j < ARCH[l + 1]; j++) {
      weights[l][j] = []; biases[l][j] = 0;
      for (let i = 0; i < ARCH[l]; i++)
        weights[l][j][i] = parseFloat((Math.random() * 2 - 1).toFixed(2));
    }
  }
  shuffleDataset();
  saveCycleState();
}

let cycleBiases = null;
function saveCycleState() {
  cycleWeights = JSON.parse(JSON.stringify(weights));
  cycleBiases = JSON.parse(JSON.stringify(biases));
  cycleInput = inputData.slice();
  cycleLabel = label;
}

function forwardLayer(toL) {
  if (!acts[0]) acts = [inputData.slice()], preActs = [null];
  const l = toL - 1;
  const la = [], lp = [];
  for (let j = 0; j < ARCH[toL]; j++) {
    let z = biases[l][j];
    for (let i = 0; i < ARCH[l]; i++) z += weights[l][j][i] * acts[l][i];
    lp.push(z);
    la.push(l === ARCH.length - 2 ? sigmoid(z) : relu(z));
  }
  acts[toL] = la; preActs[toL] = lp;
}

function backwardFull() {
  const nL = ARCH.length;
  grads = Array(nL).fill(null).map(() => []);
  wDeltas = [];
  let bDeltas = [];
  grads[nL - 1][0] = (acts[nL - 1][0] - label) * sigmoidDeriv(preActs[nL - 1][0]);
  for (let l = nL - 2; l >= 1; l--)
    for (let i = 0; i < ARCH[l]; i++) {
      let s = 0;
      for (let j = 0; j < ARCH[l + 1]; j++) s += weights[l][j][i] * grads[l + 1][j];
      grads[l][i] = s * (preActs[l][i] > 0 ? 1 : 0);
    }
  for (let l = 0; l < nL - 1; l++) {
    wDeltas[l] = []; bDeltas[l] = [];
    for (let j = 0; j < ARCH[l + 1]; j++) {
      wDeltas[l][j] = [];
      bDeltas[l][j] = LR * grads[l + 1][j];
      for (let i = 0; i < ARCH[l]; i++)
        wDeltas[l][j][i] = LR * grads[l + 1][j] * acts[l][i];
    }
  }
  // bDeltas를 저장해서 applyWeights에서 사용
  backwardFull._bDeltas = bDeltas;
}

function applyWeights() {
  const bDeltas = backwardFull._bDeltas || [];
  for (let l = 0; l < ARCH.length - 1; l++)
    for (let j = 0; j < ARCH[l + 1]; j++) {
      for (let i = 0; i < ARCH[l]; i++)
        weights[l][j][i] = parseFloat((weights[l][j][i] - wDeltas[l][j][i]).toFixed(4));
      if (bDeltas[l]) biases[l][j] = parseFloat((biases[l][j] - bDeltas[l][j]).toFixed(4));
    }
  epoch++;
  totalLoss = ((acts[ARCH.length - 1][0] - label) ** 2);
}

// ─── 파티클 ───
function spawnParticles(fromL, toL, color) {
  let delay = 0;
  for (let i = 0; i < ARCH[fromL]; i++)
    for (let j = 0; j < ARCH[toL]; j++) {
      const d = delay;
      setTimeout(() => {
        particles.push({
          x1: LAYER_X[fromL] + (fromL < toL ? NODE_R : -NODE_R), y1: nodeY(fromL, i),
          x2: LAYER_X[toL]   + (fromL < toL ? -NODE_R : NODE_R), y2: nodeY(toL, j),
          x: 0, y: 0, t: 0, speed: 0.025, color,
        });
      }, d);
      delay += 40;
    }
}

function updateParticles() {
  particles = particles.filter(p => p.t < 1);
  for (const p of particles) {
    p.t = Math.min(p.t + p.speed, 1);
    p.x = p.x1 + (p.x2 - p.x1) * p.t;
    p.y = p.y1 + (p.y2 - p.y1) * p.t;
  }
}

// ─── 그리기 ───
function drawAll() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = C.bg; ctx.fillRect(0, 0, W, H);

  const sid = STEPS[currentStep].id;

  // 레이어 라벨
  ctx.font = '13px KoPub World 돋움, 맑은 고딕'; ctx.fillStyle = C.textDim; ctx.textAlign = 'center';
  ['입력층', '은닉층', '출력층'].forEach((t, l) => ctx.fillText(t, LAYER_X[l], 22));
  ctx.font = '11px KoPub World 돋움, 맑은 고딕';
  ctx.fillStyle = '#7eb8d4'; ctx.fillText('ReLU', LAYER_X[1], H - 12);
  ctx.fillStyle = '#e8a0aa'; ctx.fillText('Sigmoid', LAYER_X[2], H - 12);

  // 연결선
  for (let l = 0; l < ARCH.length - 1; l++)
    for (let j = 0; j < ARCH[l + 1]; j++)
      for (let i = 0; i < ARCH[l]; i++) {
        const x1 = LAYER_X[l] + NODE_R, y1 = nodeY(l, i);
        const x2 = LAYER_X[l+1] - NODE_R, y2 = nodeY(l+1, j);
        let lc = C.line, lw = 1.5;
        if (sid === 'forward1' && l === 0) { lc = C.forward; lw = 2; }
        if (sid === 'forward2' && l === 1) { lc = C.forward; lw = 2; }
        if (sid === 'backward1' && l === 1) { lc = C.backward; lw = 2; }
        if (sid === 'backward2' && l === 0) { lc = C.backward; lw = 2; }
        if (sid === 'update' && wDeltas.length > 0) {
          const d = wDeltas[l]?.[j] ? Math.abs(wDeltas[l][j][i]) : 0;
          lc = d > 0.001 ? C.weightChanged : C.line; lw = d > 0.001 ? 2.5 : 1.5;
        }
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.strokeStyle = lc; ctx.lineWidth = lw; ctx.globalAlpha = 0.6; ctx.stroke(); ctx.globalAlpha = 1;

        // 가중치 숫자 — 출발점 쪽 25% 지점에 표시 (겹침 방지)
        const t = 0.25;
        const mx = x1 + (x2 - x1) * t, my = y1 + (y2 - y1) * t;
        const w = weights[l][j][i];
        const changed = sid === 'update' && wDeltas[l]?.[j] && Math.abs(wDeltas[l][j][i]) > 0.001;
        const wStr = changed ? w.toFixed(3) : w.toFixed(2);
        ctx.font = '10px monospace'; ctx.textAlign = 'center';
        const tw2 = ctx.measureText(wStr).width + 4;
        ctx.fillStyle = '#3a5438'; ctx.fillRect(mx - tw2/2, my - 10, tw2, 13);
        ctx.fillStyle = changed ? C.weightChanged : C.weightNormal;
        ctx.fillText(wStr, mx, my);
      }

  // 파티클
  for (const p of particles) {
    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.globalAlpha = p.t < 0.8 ? 1 : (1-p.t)/0.2; ctx.fill(); ctx.globalAlpha = 1;
  }

  // 노드
  const isBack = sid.includes('backward');
  for (let l = 0; l < ARCH.length; l++)
    for (let n = 0; n < ARCH[l]; n++) {
      const x = LAYER_X[l], y = nodeY(l, n);
      const hasVal = acts.length > l && acts[l]?.[n] !== undefined;
      const val = hasVal ? acts[l][n] : 0;
      const alpha = hasVal ? 0.2 + Math.min(Math.abs(val), 1) * 0.5 : 0.12;
      ctx.beginPath(); ctx.arc(x, y, NODE_R, 0, Math.PI*2);
      ctx.fillStyle = isBack ? `rgba(232,160,170,${alpha})` : `rgba(126,184,212,${alpha})`;
      ctx.fill(); ctx.strokeStyle = C.nodeBorder; ctx.lineWidth = 2; ctx.stroke();
      ctx.textAlign = 'center';
      if (l === 0) {
        ctx.font = 'bold 13px monospace'; ctx.fillStyle = C.text;
        ctx.fillText(inputData[n].toFixed(2), x, y + 4);
        ctx.font = '10px KoPub World 돋움, 맑은 고딕'; ctx.fillStyle = C.textDim;
        ctx.fillText(INPUT_LABELS[n], x, y - NODE_R - 6);
      } else if (hasVal) {
        ctx.font = 'bold 12px monospace'; ctx.fillStyle = C.text;
        ctx.fillText(val.toFixed(3), x, y + 4);
        // 출력층에 오리/거위 표시
        if (l === ARCH.length - 1) {
          ctx.font = '11px KoPub World 돋움, 맑은 고딕';
          ctx.fillStyle = val >= 0.5 ? '#ffd080' : '#7eb8d4';
          ctx.fillText(val >= 0.5 ? '거위🪿' : '오리🦆', x, y + NODE_R + 16);
        }
      } else {
        ctx.font = '14px monospace'; ctx.fillStyle = '#5a7a57'; ctx.fillText('?', x, y + 5);
      }
    }

  // 손실 패널 (④ 오차 계산 단계)
  if (sid === 'loss' && acts[ARCH.length - 1]) {
    const out = acts[ARCH.length - 1][0];
    const loss = ((out - label) ** 2).toFixed(5);
    const cx = LAYER_X[ARCH.length - 1];
    const boxW = 148, boxH = 96;
    const px = cx - boxW / 2, py = 30;
    ctx.fillStyle = '#243422';
    ctx.fillRect(px, py, boxW, boxH);
    ctx.textAlign = 'left'; ctx.font = '12px KoPub World 돋움, 맑은 고딕';
    ctx.fillStyle = C.forward;
    ctx.fillText(`예측: ${out.toFixed(3)}`, px + 12, py + 20);
    ctx.fillStyle = out >= 0.5 ? '#ffd080' : '#7eb8d4';
    ctx.fillText(`→ ${predict(out)}`, px + 12, py + 38);
    ctx.fillStyle = C.textDim;
    ctx.fillText(`정답: ${label === 1 ? '거위🪿' : '오리🦆'}`, px + 12, py + 56);
    ctx.fillStyle = C.weightChanged;
    ctx.fillText(`손실: ${loss}`, px + 12, py + 74);
  }

  // 하단 정답 표시
  ctx.font = '12px KoPub World 돋움, 맑은 고딕'; ctx.fillStyle = C.textDim; ctx.textAlign = 'left';
  ctx.fillText(`[${DATASET[dataIdx].name}]  정답: ${label === 1 ? '거위 🪿' : '오리 🦆'} (${label})  ·  데이터 ${dataIdx+1}/${DATASET.length}`, 10, H - 10);
  ctx.textAlign = 'right';
  ctx.fillText(`단계 ${currentStep + 1} / ${STEPS.length}`, W - 10, H - 10);
}

// ─── 단계 정의 ───
const STEPS = [
  {
    id: 'init',
    name: '① 초기 상태',
    get desc() {
      return `목 길이(x₁ = ${inputData[0].toFixed(2)})와 부리 크기(x₂ = ${inputData[1].toFixed(2)})가 입력됩니다. 정답: ${label===1?'거위 🪿':'오리 🦆'}\n연결선의 숫자가 가중치(w)입니다. 지금은 무작위로 설정된 상태입니다.`;
    },
  },
  {
    id: 'forward1',
    name: '② 순전파 — 입력층 → 은닉층',
    desc: '입력값에 가중치(w)를 곱하고 더한 뒤 ReLU를 통과시킵니다.\nReLU: 음수 → 0, 양수 → 그대로. 불필요한 신호를 차단합니다.',
  },
  {
    id: 'forward2',
    name: '③ 순전파 — 은닉층 → 출력층',
    desc: '은닉층 출력에 가중치를 곱하고 더한 뒤 Sigmoid를 통과시킵니다.\nSigmoid: 결과를 0~1 확률로 변환합니다. 0.5 이상이면 거위, 미만이면 오리로 예측합니다.',
  },
  {
    id: 'loss',
    name: '④ 오차 계산 (손실함수)',
    get desc() {
      if (!acts[ARCH.length - 1]) return '순전파 결과로 오차를 계산합니다.';
      const out = acts[ARCH.length - 1][0];
      const loss = ((out - label) ** 2).toFixed(5);
      const correct = (out >= 0.5 && label === 1) || (out < 0.5 && label === 0);
      return `모델 예측: ${predict(out)} (${out.toFixed(3)})  /  정답: ${label===1?'거위 🪿':'오리 🦆'} (${label})\n손실 L = (${out.toFixed(3)} − ${label})² = ${loss}   ${correct ? '✓ 방향은 맞음' : '✗ 틀림 → 수정 필요'}\n이 오차를 줄이는 방향으로 가중치를 역방향으로 조정합니다.`;
    },
  },
  {
    id: 'backward1',
    name: '⑤ 역전파 — 출력층 → 은닉층',
    desc: '오차 신호를 역방향으로 전달합니다.\n각 연결의 기울기(∂L/∂w)를 계산하여 가중치가 오차에 얼마나 기여했는지 파악합니다.',
  },
  {
    id: 'backward2',
    name: '⑥ 역전파 — 은닉층 → 입력층',
    desc: '은닉층까지 기울기를 전파합니다.\n모든 가중치의 기울기 계산이 완료되었습니다.',
  },
  {
    id: 'update',
    name: '⑦ 가중치 업데이트',
    get desc() {
      return `경사 하강법: w_새값 = w − 학습률(${LR}) × 기울기\n노란색 연결이 이번에 변경된 가중치입니다. 반복할수록 거위/오리 분류 정확도가 올라갑니다.\n→ 다음 사이클 준비 완료`;
    },
  },
];

// ─── 단계 실행 (애니메이션 있음) ───
function execStep(id) {
  particles = [];
  switch (id) {
    case 'init':
      acts = [inputData.slice()]; preActs = [null]; grads = []; wDeltas = []; break;
    case 'forward1':
      acts = [inputData.slice()]; preActs = [null];
      forwardLayer(1); spawnParticles(0, 1, C.forward); break;
    case 'forward2':
      forwardLayer(2); spawnParticles(1, 2, C.forward); break;
    case 'loss': break;
    case 'backward1':
      backwardFull(); spawnParticles(2, 1, C.backward); break;
    case 'backward2':
      spawnParticles(1, 0, C.backward); break;
    case 'update': {
      const currentLoss = acts[ARCH.length - 1] ? ((acts[ARCH.length - 1][0] - label) ** 2) : 1;
      if (currentLoss < 0.01) {
        totalLoss = currentLoss;
        document.getElementById('epoch-info').textContent = epoch;
        document.getElementById('loss-display').textContent = currentLoss.toFixed(5) + ' ✓ 학습완료';
        // 재생 중이면 멈춤
        isPlaying = false; clearInterval(playTimer);
        if (animFrame2) { cancelAnimationFrame(animFrame2); animFrame2 = null; }
        document.getElementById('btn-play').textContent = '⏵ 전체 재생';
      } else {
        applyWeights();
        document.getElementById('epoch-info').textContent = epoch;
        document.getElementById('loss-display').textContent = totalLoss.toFixed(5);
      }
      // 다음 데이터로 이동, 에폭 끝나면 셔플
      dataIdx++;
      if (dataIdx >= DATASET.length) shuffleDataset();
      const next = DATASET[shuffledOrder[dataIdx]];
      inputData = next.input.slice();
      label = next.label;
      saveCycleState();
      break;
    }
  }
}

// ─── 단계 실행 (애니메이션 없음, 이전 단계 이동용) ───
function execStepSilent(id) {
  switch (id) {
    case 'init': acts = [inputData.slice()]; preActs = [null]; grads = []; wDeltas = []; break;
    case 'forward1': acts = [inputData.slice()]; preActs = [null]; forwardLayer(1); break;
    case 'forward2': forwardLayer(2); break;
    case 'loss': break;
    case 'backward1': backwardFull(); break;
    case 'backward2': break;
    case 'update': /* 이전 단계로 이동 시 update는 실행 안 함 */ break;
  }
}

function updateUI() {
  const s = STEPS[currentStep];
  document.getElementById('step-name').textContent = s.name;
  document.getElementById('step-desc').textContent = s.desc;
}

function goStep(idx) {
  currentStep = idx;
  execStep(STEPS[idx].id);
  updateUI();
}

function nextStep() {
  const next = (currentStep + 1) % STEPS.length;
  goStep(next);
}

function prevStep() {
  if (currentStep === 0) return;
  const target = currentStep - 1;
  // 사이클 시작 상태로 복원 후 target까지 조용히 재실행
  weights = JSON.parse(JSON.stringify(cycleWeights));
  biases = JSON.parse(JSON.stringify(cycleBiases));
  inputData = cycleInput.slice();
  label = cycleLabel;
  acts = [inputData.slice()]; preActs = [null]; grads = []; wDeltas = []; particles = [];
  for (let i = 1; i < target; i++) execStepSilent(STEPS[i].id);
  goStep(target);
}

// ─── 애니메이션 루프 ───
function loop() {
  updateParticles();
  drawAll();
  requestAnimationFrame(loop);
}

// ─── 컨트롤 ───
document.getElementById('btn-next').addEventListener('click', () => { if (!isPlaying) nextStep(); });
document.getElementById('btn-prev').addEventListener('click', () => { if (!isPlaying) prevStep(); });

const SPEED_MAP = { 1: 2000, 2: 800, 3: 300, 4: 80, 5: 0 };
const SPEED_NAME = { 1: '느리게', 2: '보통', 3: '빠르게', 4: '매우 빠름', 5: '최고속' };
let playInterval = 1000;

document.getElementById('speed-slider').addEventListener('input', function () {
  const v = parseInt(this.value);
  playInterval = SPEED_MAP[v];
  document.getElementById('speed-label').textContent = SPEED_NAME[v];
  if (isPlaying) {
    clearInterval(playTimer);
    if (animFrame2) { cancelAnimationFrame(animFrame2); animFrame2 = null; }
    startPlay();
  }
});

function startPlay() {
  if (playInterval === 0) {
    // 최고속: requestAnimationFrame으로 매 프레임마다 여러 스텝 실행
    let lastTime = 0;
    function fastLoop(t) {
      if (!isPlaying) return;
      // 매 프레임 7스텝씩 실행 (한 사이클 = 7스텝이므로 1프레임에 1사이클)
      for (let i = 0; i < 7; i++) nextStep();
      animFrame2 = requestAnimationFrame(fastLoop);
    }
    animFrame2 = requestAnimationFrame(fastLoop);
  } else {
    playTimer = setInterval(nextStep, playInterval);
  }
}

let animFrame2 = null;

document.getElementById('btn-play').addEventListener('click', function () {
  if (isPlaying) {
    isPlaying = false;
    clearInterval(playTimer);
    if (animFrame2) { cancelAnimationFrame(animFrame2); animFrame2 = null; }
    this.textContent = '⏵ 전체 재생';
  } else {
    isPlaying = true; this.textContent = '⏸ 일시정지';
    nextStep(); startPlay();
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  isPlaying = false; clearInterval(playTimer);
  document.getElementById('btn-play').textContent = '⏵ 전체 재생';
  initWeights(); epoch = 0; totalLoss = 0;
  const first = DATASET[shuffledOrder[0]];
  inputData = first.input.slice(); label = first.label; particles = [];
  document.getElementById('epoch-info').textContent = '0';
  document.getElementById('loss-display').textContent = '—';
  saveCycleState();
  goStep(0);
});

document.addEventListener('keydown', e => {
  if (isPlaying) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); prevStep(); }
});

// ─── 시작 ───
initWeights();
goStep(0);
loop();
</script>
